<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SentinelEye 👁️</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://kit.fontawesome.com/a2d04b7c67.js" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <!-- Left: Video Feed -->
    <div class="video-section card">
      <h2><i class="fas fa-video"></i> Live Feed</h2>
      <img src="{{ url_for('video_feed') }}" alt="Live Feed">
    </div>

    <!-- Right: Controls -->
    <div class="sidebar">
      <div class="card">
        <h3><i class="fas fa-user-secret"></i> Pending Intruder</h3>
        <p>ID: {{ pending_id }}</p>
        {% if pending_img %}
          <img src="{{ pending_img }}" class="pending-img">
        {% else %}
          <p>No pending intruders</p>
        {% endif %}
        <form method="post" action="/allow">
          <input type="text" name="name" placeholder="Enter name (e.g. Shivam)" required>
          <button type="submit" class="btn">Allow / Add to Known</button>
        </form>
      </div>

      <div class="card">
        <h3><i class="fas fa-envelope"></i> Register Email</h3>
        <form method="post" action="/register_email">
          <input type="email" name="email" placeholder="your@mail.com" required>
          <button type="submit" class="btn">Add</button>
        </form>
      </div>

      <div class="card logs">
        <h3><i class="fas fa-history"></i> Recent Logs</h3>
        <table>
          <tr>
            <th>ID</th><th>Time</th><th>Image</th><th>Label</th><th>Emailed</th>
          </tr>
          {% for log in logs %}
          <tr>
            <td>{{ log.id }}</td>
            <td>{{ log.time }}</td>
            <td>
              <a href="{{ log.image }}" target="_blank">
                <i class="fas fa-image"></i>
              </a>
            </td>
            <td>{{ log.label }}</td>
            <td>{{ log.emailed }}</td>
          </tr>
          {% endfor %}
        </table>
      </div>
    </div>
  </div>
</body>
</html>
